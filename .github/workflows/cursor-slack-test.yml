# Manual run: verify Slack bot token by opening a DM and posting as the bot (not a user integration).
# Requires repo secret SLACK_BOT_TOKEN (Bot User OAuth Token, xoxb-...) with im:write and chat:write.
name: Slack bot test

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post test DM via Slack Web API
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          if [ -z "${SLACK_BOT_TOKEN}" ]; then
            echo "::error::SLACK_BOT_TOKEN secret is not set."
            exit 1
          fi
          # Open (or reuse) DM between the bot and this user; messages appear from the app/bot.
          OPEN=$(curl -s -X POST https://slack.com/api/conversations.open \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"users":"U0AKVLWEJ7J"}')
          echo "$OPEN" | jq .
          if ! echo "$OPEN" | jq -e '.ok == true' >/dev/null 2>&1; then
            echo "::error::conversations.open failed: $(echo "$OPEN" | jq -r '.error // "unknown"')"
            exit 1
          fi
          CHANNEL=$(echo "$OPEN" | jq -r '.channel.id')
          MSG='Test from Menegroth Slack bot (GitHub Actions)'
          POST=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n --arg ch "$CHANNEL" --arg text "$MSG" '{channel: $ch, text: $text}')")
          echo "$POST" | jq .
          if ! echo "$POST" | jq -e '.ok == true' >/dev/null 2>&1; then
            echo "::error::chat.postMessage failed: $(echo "$POST" | jq -r '.error // "unknown"')"
            exit 1
          fi
          TS=$(echo "$POST" | jq -r '.ts')
          LINK=$(curl -s -X POST https://slack.com/api/chat.getPermalink \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "channel=${CHANNEL}" \
            --data-urlencode "message_ts=${TS}")
          echo "$LINK" | jq .
          if echo "$LINK" | jq -e '.ok == true' >/dev/null 2>&1; then
            echo "Permalink: $(echo "$LINK" | jq -r '.permalink')"
          fi
