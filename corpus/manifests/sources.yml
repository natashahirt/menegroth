# corpus/manifests/sources.yml
#
# Allowlist of source documents to copy into corpus/sources/ (and mirror their
# sibling .txt into corpus/text/). Consumed by scripts/corpus/ingest.py.
#
# Fields per entry:
#   id            : stable, human-meaningful identifier (kebab-case)
#   origin        : repo-relative path to upstream document
#   source_path   : repo-relative destination under corpus/sources/
#   text_path     : repo-relative destination under corpus/text/ (sibling .txt)
#   family        : code family (aci|aisc|csa|fib|foundations|slabs|...)
#   role          : codes | code_guides | examples | research | textbooks
#   edition       : free-form version/edition string
#   tier          : 1 (highest priority) ... 4
#   encrypted     : true if the PDF requires a password (handled by ingest)
#   notes         : free-form

