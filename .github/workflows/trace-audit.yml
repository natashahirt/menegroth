name: Trace Coverage Audit

on:
  workflow_run:
    workflows: ["Nightly Doc Audit"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-and-launch:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Check for already-running trace audit (GitHub)
        id: concurrent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNS=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/trace-audit.yml/runs?status=in_progress&per_page=10")
          COUNT=$(echo "$RUNS" | jq '.total_count')
          if [ "$COUNT" -gt 1 ]; then
            echo "Another trace-audit run already in progress — skipping."
            echo "should_launch=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_launch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for already-running Cursor trace-audit agent
        id: cursor_agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "No CURSOR_API_KEY — skipping Cursor check, allowing launch."
            echo "cursor_agent_running=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          resp_file=$(mktemp)
          code=$(curl -s -w "%{http_code}" -o "$resp_file" -u "${CURSOR_API_KEY}:" "https://api.cursor.com/v0/agents?limit=50")
          if [ "$code" != "200" ]; then
            echo "Cursor API returned $code — allowing launch."
            echo "cursor_agent_running=false" >> "$GITHUB_OUTPUT"
            rm -f "$resp_file"
            exit 0
          fi
          running=$(jq -c --arg repo "$REPO_URL" '[.agents[]? | select(.status == "RUNNING" and ((.source.repository // "") == $repo))] | length' "$resp_file" 2>/dev/null || echo "0")
          rm -f "$resp_file"
          if [ "${running:-0}" -gt 0 ] 2>/dev/null; then
            echo "A Cursor trace-audit agent is already RUNNING — skipping."
            echo "cursor_agent_running=true" >> "$GITHUB_OUTPUT"
          else
            echo "cursor_agent_running=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for source changes relevant to trace
        id: check
        run: |
          CHANGED=$(git log origin/main --since="24 hours ago" --name-only --pretty=format: | \
            grep -E '^(StructuralSizer/src/|StructuralSynthesizer/src/)' | \
            sort -u)

          if [ -z "$CHANGED" ]; then
            echo "No source changes in last 24h — skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$CHANGED" | wc -l)
            echo "Source changes detected in $COUNT files:"
            echo "$CHANGED"
            echo "$CHANGED" > trace_audit_changed_files.txt
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Launch Cursor Cloud Agent
        if: steps.check.outputs.has_changes == 'true' && steps.concurrent.outputs.should_launch == 'true' && steps.cursor_agent.outputs.cursor_agent_running != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          # Build prompt: trace-audit instructions + static report placeholder + changed files
          cat scripts/prompts/trace-audit.md > full_prompt.txt
          echo "" >> full_prompt.txt
          echo "---" >> full_prompt.txt
          echo "" >> full_prompt.txt
          echo "## Changed files (prioritize these)" >> full_prompt.txt
          echo "" >> full_prompt.txt
          echo "Focus the audit on the following paths that changed recently. Check whether any new decision-making functions need trace instrumentation, and whether existing traces in these files are still correct." >> full_prompt.txt
          echo "" >> full_prompt.txt
          echo '```' >> full_prompt.txt
          cat trace_audit_changed_files.txt >> full_prompt.txt
          echo '```' >> full_prompt.txt
          PROMPT=$(cat full_prompt.txt)

          REPO_URL="https://github.com/${{ github.repository }}"
          BRANCH="cursor/trace-audit-$(date +%Y-%m-%d)"

          RESPONSE=$(curl -s -X POST https://api.cursor.com/v0/agents \
            -u "$CURSOR_API_KEY:" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg repo "$REPO_URL" \
              --arg branch "$BRANCH" \
              '{
                prompt: { text: $prompt },
                model: "gpt-5.2",
                source: { repository: $repo, ref: "main" },
                target: { autoCreatePr: true, branchName: $branch }
              }')")

          echo "Agent launched:"
          echo "$RESPONSE" | jq .

          if echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            echo "::error::Cursor API error: $(echo "$RESPONSE" | jq -r '.error')"
            echo "::error::Ensure the Cursor GitHub App has access to this repo and the API key matches that installation."
            exit 1
          fi
