# Manual run: launch a Cursor Cloud Agent that posts a test message to Slack.
# Uses the connected Slack integration (no webhook required).
name: Cursor Slack test

on:
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Launch Cursor agent (Slack test)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "::error::CURSOR_API_KEY secret is not set."
            exit 1
          fi
          PROMPT='Your only task: send one short message to Slack using the connected Slack integration.

          - Send a DM to Tasha (Slack user ID U0AKVLWEJ7J) with the exact text: "Test from Cursor cloud agent (GitHub Actions)".
          - Confirm in your response that you sent it and include the Slack message link.'
          REPO_URL="https://github.com/${{ github.repository }}"
          BRANCH="cursor/slack-test"
          RESPONSE=$(curl -s -X POST https://api.cursor.com/v0/agents \
            -u "$CURSOR_API_KEY:" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg repo "$REPO_URL" \
              --arg branch "$BRANCH" \
              '{
                prompt: { text: $prompt },
                model: "gpt-5.2",
                source: { repository: $repo, ref: "main" },
                target: { autoCreatePr: false, branchName: $branch }
              }')")
          echo "Agent launched:"
          echo "$RESPONSE" | jq .
          if echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            echo "::error::Cursor API error: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi
